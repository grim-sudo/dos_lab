# ─────────────────────────────────────────────────────────────────────────────
# dnsmasq.conf — intentionally vulnerable configuration
# Used by the DNS service in the TrackShop DoS training lab.
#
# Vulnerability summary:
#   - Cache completely disabled (cache-size=0): every query forces a fresh
#     lookup and response generation, multiplying CPU cost per request.
#   - No rate limiting per client: any source IP may flood with queries.
#   - Open resolver: no ACL restricts which hosts may query this server.
#   - Large TXT records: high-byte responses amplify traffic volume.
# ─────────────────────────────────────────────────────────────────────────────

# ── Listen on all interfaces ──────────────────────────────────────────────────
listen-address=0.0.0.0
port=53
bind-interfaces

# ── Disable caching — every query is freshly processed ───────────────────────
# In production you would set cache-size=1000 or higher.
cache-size=0

# ── No upstream resolver — serve all records locally ─────────────────────────
no-resolv
no-hosts

# ── Allow unrestricted concurrent queries (no per-client rate limit) ─────────
dns-forward-max=500

# ── Local A records ───────────────────────────────────────────────────────────
address=/trackshop.local/172.28.0.30
address=/shop.internal/172.28.0.30
address=/api.internal/172.28.0.20
address=/db.internal/172.28.0.10
address=/dns.internal/172.28.0.40

# ── Wildcard subdomains (increases per-query processing work) ─────────────────
address=/auth.trackshop.local/172.28.0.20
address=/admin.trackshop.local/172.28.0.30
address=/static.trackshop.local/172.28.0.30
address=/media.trackshop.local/172.28.0.30
address=/cdn.trackshop.local/172.28.0.30
address=/mail.trackshop.local/172.28.0.20
address=/smtp.trackshop.local/172.28.0.20

# ── Large TXT records ─────────────────────────────────────────────────────────
# These simulate real-world SPF/DKIM/DMARC records and produce large UDP
# response payloads, making each query more expensive to transmit.
txt-record=trackshop.local,"v=spf1 ip4:172.28.0.0/24 ip4:10.0.0.0/8 ip4:192.168.0.0/16 include:_spf.trackshop.local include:mail.trackshop.local include:smtp.trackshop.local ~all"
txt-record=_dmarc.trackshop.local,"v=DMARC1; p=none; rua=mailto:dmarc@trackshop.local; ruf=mailto:dmarc@trackshop.local; fo=1; adkim=r; aspf=r; pct=100; rf=afrf; ri=86400; sp=none"
txt-record=_domainkey.trackshop.local,"v=DKIM1; k=rsa; p=MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQC2a/qmigkFMVcWexample0000000000000000000000000000000000000000000000000"
txt-record=shop.internal,"v=spf1 include:trackshop.local ip4:172.28.0.0/24 ~all LAB-DNS-AMPLIFICATION-DEMO-RECORD"
