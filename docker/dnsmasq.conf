# ─────────────────────────────────────────────────────────────────────────────
# dnsmasq.conf — standalone single-container version
# Intentionally vulnerable: no rate limiting, cache disabled, open resolver.
# ─────────────────────────────────────────────────────────────────────────────

listen-address=0.0.0.0
port=53
bind-interfaces

# Disable caching — every query is freshly processed (intentional vulnerability)
cache-size=0

# No upstream resolver
no-resolv
no-hosts

# No per-client query rate limit
dns-forward-max=500

# Local A records
address=/trackshop.local/127.0.0.1
address=/shop.internal/127.0.0.1
address=/api.internal/127.0.0.1
address=/db.internal/127.0.0.1
address=/auth.trackshop.local/127.0.0.1
address=/admin.trackshop.local/127.0.0.1
address=/static.trackshop.local/127.0.0.1
address=/media.trackshop.local/127.0.0.1
address=/mail.trackshop.local/127.0.0.1
address=/smtp.trackshop.local/127.0.0.1

# Large TXT records (amplification demo)
txt-record=trackshop.local,"v=spf1 ip4:127.0.0.0/8 ip4:10.0.0.0/8 ip4:192.168.0.0/16 include:_spf.trackshop.local include:mail.trackshop.local include:smtp.trackshop.local ~all"
txt-record=_dmarc.trackshop.local,"v=DMARC1; p=none; rua=mailto:dmarc@trackshop.local; ruf=mailto:dmarc@trackshop.local; fo=1; adkim=r; aspf=r; pct=100; rf=afrf; ri=86400; sp=none"
txt-record=_domainkey.trackshop.local,"v=DKIM1; k=rsa; p=MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQC2a/qmigkFMVcWexample0000000000000000000000000000000000000000"
txt-record=shop.internal,"v=spf1 include:trackshop.local ip4:127.0.0.0/8 ~all LAB-DNS-AMPLIFICATION-DEMO-RECORD"
