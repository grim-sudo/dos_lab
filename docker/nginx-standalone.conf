# Standalone (all-in-one) Nginx config
# Backend runs on localhost:3000 inside the same container.

worker_processes 1;
worker_rlimit_nofile 512;

events {
    worker_connections 256;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  15;
    keepalive_requests 100;

    client_body_buffer_size    8k;
    client_max_body_size       1m;
    client_header_buffer_size  1k;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    log_format main '$remote_addr - $request_method $request - $status '
                    '$body_bytes_sent - "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        root /var/www/trackshop;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Backend runs on localhost inside the same container
        location /api/ {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        location /health {
            proxy_pass http://127.0.0.1:3000/api/health;
        }
    }
}
