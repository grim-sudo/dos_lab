# Intentionally limited worker configuration to make HTTP flood impact visible
worker_processes 1;
worker_rlimit_nofile 512;

events {
    worker_connections 256;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # No rate limiting — intentional for lab exercise
    # (In production you would add: limit_req_zone, limit_conn_zone, etc.)

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Short keepalive to recycle connections but not protect against flood
    keepalive_timeout  15;
    keepalive_requests 100;

    # Small client buffers — easier to saturate
    client_body_buffer_size    8k;
    client_max_body_size       1m;
    client_header_buffer_size  1k;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    log_format main '$remote_addr - $request_method $request - $status '
                    '$body_bytes_sent - "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        root /var/www/trackshop;
        index index.html;

        # ── Frontend (SPA) ─────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Backend API proxy ──────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://172.28.0.20:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            # No upstream timeout limits — intentional for lab
            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        # ── Health endpoint for quick liveness checks ──────────────────────
        location /health {
            proxy_pass http://172.28.0.20:3000/api/health;
        }
    }
}
